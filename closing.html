<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>여정의 마무리 — BLOOM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700&display=swap">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.min.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; overflow: hidden; }
body { font-family: 'Pretendard', -apple-system, sans-serif; color: #1A1A1A; background: #A8C5E8; }
.serif { font-family: 'Playfair Display', serif; }
.italic-cap { font-family: 'Cormorant Garamond', serif; font-style: italic; }

@keyframes floatBfly {
  0%, 100% { transform: translate(0, 0) rotate(-5deg); }
  50% { transform: translate(8px, -12px) rotate(5deg); }
}
@keyframes floatBflySlow {
  0%, 100% { transform: translate(0, 0) rotate(5deg); }
  50% { transform: translate(-10px, -8px) rotate(-3deg); }
}
.float-bfly { animation: floatBfly 4s ease-in-out infinite; }
.float-bfly-slow { animation: floatBflySlow 5s ease-in-out infinite; }

.home-link { position: fixed; top: 22px; left: 22px; z-index: 10; color: rgba(255,255,255,0.9); text-decoration: none; font-size: 13px; font-weight: 600; background: rgba(255,255,255,0.18); backdrop-filter: blur(6px); padding: 8px 16px; border-radius: 100px; }

.cta-btn {
  background: #E91A75; color: #FFFFFF; padding: 16px 38px; border-radius: 100px;
  font-size: 15px; font-weight: 500; text-decoration: none;
  display: inline-flex; align-items: center; gap: 12px;
  box-shadow: 0 8px 20px rgba(233,26,117,0.4); transition: all 0.3s ease; margin-top: 8px;
}
.cta-btn:hover { transform: translateY(-3px); box-shadow: 0 12px 28px rgba(233,26,117,0.55); }
</style>
</head>
<body>

<a href="index.html" class="home-link">‹ 처음으로</a>

<div style="background: #A8C5E8; padding: 60px 70px; height: 100vh; position: relative; overflow: hidden;">
  <!-- 모서리 장식 -->
  <img src="assets/hydrangea-cluster.png" alt="" style="position: absolute; left: -30px; top: -20px; width: 230px;"/>
  <img src="assets/green-leaves.png" alt="" style="position: absolute; right: 50px; top: 50px; width: 110px; opacity: 0.65;"/>
  <img src="assets/butterfly.png" alt="" class="float-bfly" style="position: absolute; right: 200px; top: 70px; width: 48px;"/>
  <img src="assets/green-leaves.png" alt="" style="position: absolute; left: 70px; bottom: 80px; width: 140px; opacity: 0.7; transform: rotate(20deg);"/>
  <img src="assets/hydrangea-cluster.png" alt="" style="position: absolute; right: -30px; bottom: -10px; width: 210px;"/>
  <img src="assets/butterfly.png" alt="" class="float-bfly-slow" style="position: absolute; left: 220px; top: 50px; width: 36px;"/>

  <!-- 중앙 배경 큰 수국 -->
  <img src="assets/hydrangea-main.png" alt="" style="position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); width: 500px; opacity: 0.15;"/>

  <!-- 중앙 콘텐츠 -->
  <div style="position: relative; z-index: 2; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 28px;">

    <div class="italic-cap" style="font-size: 18px; color: #FFFFFF; opacity: 0.85; letter-spacing: 4px;">BLOOM</div>

    <div style="display: flex; align-items: center; justify-content: center; gap: 20px;">
      <div style="width: 50px; height: 1px; background: #FFFFFF; opacity: 0.6;"></div>
      <img src="assets/butterfly.png" alt="" style="width: 32px; height: 32px;"/>
      <div style="width: 50px; height: 1px; background: #FFFFFF; opacity: 0.6;"></div>
    </div>

    <h2 class="serif" style="font-size: 100px; font-weight: 500; color: #FFFFFF; letter-spacing: 6px; margin: 0; line-height: 1;">THANK YOU</h2>

    <p class="italic-cap" style="font-size: 22px; color: #FFFFFF; margin: 0; opacity: 0.95;">이 여정의 마무리를 지어볼까요?</p>

    <div style="width: 80px; height: 1px; background: #FFFFFF; opacity: 0.5; margin: 12px 0;"></div>

    <div style="background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(10px); padding: 22px 44px; border-radius: 100px; display: flex; align-items: center; gap: 20px; border: 1px solid rgba(255,255,255,0.3);">
      <img src="assets/school-logo.png" alt="" style="width: 40px; height: 40px; object-fit: contain; filter: brightness(0) invert(1);"/>
      <div style="text-align: left;">
        <div class="serif" style="font-size: 16px; color: #FFFFFF; font-weight: 500;">한국디지털미디어고등학교 e-비즈니스과</div>
        <div class="italic-cap" style="font-size: 13px; color: #FFFFFF; opacity: 0.85;">BLOOM · 2026 Summer · 학과체험</div>
      </div>
    </div>

    <!-- 기념 페이지 버튼 -->
    <a href="souvenir.html" class="cta-btn">
      🏆 나의 기념 페이지 보기 <span style="font-size: 16px;">→</span>
    </a>

    <p class="italic-cap" style="font-size: 14px; color: #FFFFFF; margin: 12px 0 0; opacity: 0.7;">See you around 🌸</p>
  </div>
</div>

</body>
</html>
