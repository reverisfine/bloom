<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stage 05 · 꽃 피우기 — BLOOM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&display=swap">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.min.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; overflow: hidden; }
body { font-family: 'Pretendard', -apple-system, sans-serif; color: #1A1A1A; background: #FAF6EC; font-size: 15px; }
.serif { font-family: 'Playfair Display', serif; }
.italic-cap { font-family: 'Cormorant Garamond', serif; font-style: italic; }

.home-btn { position: fixed; top: 20px; left: 20px; z-index: 100; padding: 8px 16px; background: rgba(255,255,255,0.9); border: 1px solid rgba(168,197,232,0.5); border-radius: 20px; font-size: 13px; color: #5F5F5F; text-decoration: none; font-family: 'Cormorant Garamond', serif; font-style: italic; transition: all 0.3s; }
.home-btn:hover { background: #A8C5E8; color: #FFFFFF; }
.next-btn-top { position: fixed; top: 20px; right: 20px; z-index: 100; padding: 8px 18px; background: #E91A75; border-radius: 20px; font-size: 13px; color: #FFF; text-decoration: none; transition: all 0.3s; }
.next-btn-top:hover { background: #C71060; }

.wrap { width: 100vw; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 40px 30px; gap: 16px; }
.title-row { text-align: center; }
.stage-label { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 15px; color: #A8C5E8; }
.title { font-family: 'Playfair Display', serif; font-size: 30px; font-weight: 500; margin-top: 2px; }

.main-area { display: flex; gap: 32px; align-items: center; }

/* 꽃 무대 */
.flower-stage { width: 380px; height: 380px; border-radius: 24px; background: linear-gradient(160deg, #EAF1F9 0%, #FBE4EE 100%); display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; box-shadow: 0 20px 50px rgba(168,197,232,0.3); }
#flowerHost { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
/* 영상 교체용: <video> 넣을 자리 */
#bloomVideo { width: 100%; height: 100%; object-fit: cover; display: none; }

/* 오른쪽 패널 */
.side-panel { display: flex; flex-direction: column; gap: 16px; width: 300px; }
.cam-box { width: 100%; height: 200px; border-radius: 16px; background: #1A1A1A; position: relative; overflow: hidden; border: 2px solid #C8DDB5; }
#cam { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
.cam-status { position: absolute; bottom: 8px; left: 8px; font-size: 11px; color: #FFF; background: rgba(0,0,0,0.5); padding: 4px 10px; border-radius: 10px; }
.gesture-badge { position: absolute; top: 8px; right: 8px; font-size: 24px; background: rgba(255,255,255,0.85); width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }

.bloom-meter { background: #FFF; border-radius: 14px; padding: 16px 18px; border: 1px solid #E8E0CC; }
.meter-label { font-size: 12px; color: #5F5F5F; margin-bottom: 8px; display: flex; justify-content: space-between; }
.meter-label b { color: #E91A75; font-family: 'Playfair Display', serif; }
.meter-track { height: 12px; background: #F0E9D8; border-radius: 6px; overflow: hidden; }
.meter-fill { height: 100%; background: linear-gradient(90deg, #A8C5E8, #E91A75); border-radius: 6px; width: 0%; transition: width 0.15s ease; }

.fallback { background: rgba(168,197,232,0.12); border-radius: 14px; padding: 14px 18px; }
.fallback-label { font-size: 12px; color: #5F5F5F; margin-bottom: 8px; }
.slider { width: 100%; cursor: pointer; accent-color: #E91A75; }

.hint-bar { text-align: center; font-size: 13px; color: #5F5F5F; background: rgba(255,255,255,0.7); padding: 10px 24px; border-radius: 30px; }
.hint-bar b { color: #E91A75; }

.start-overlay { position: fixed; inset: 0; background: rgba(26,26,26,0.85); backdrop-filter: blur(6px); display: flex; align-items: center; justify-content: center; z-index: 500; }
.start-card { background: #FAF6EC; border-radius: 24px; padding: 44px 50px; text-align: center; max-width: 440px; }
.btn { padding: 14px 32px; border-radius: 100px; font-size: 15px; cursor: pointer; border: none; background: #E91A75; color: #FFF; font-family: 'Pretendard'; transition: all 0.3s; }
.btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(233,26,117,0.4); }
</style>
</head>
<body>

<a href="stage4.html" class="home-btn">‹ 이전으로</a>
<a href="stage6.html" class="next-btn-top">다음 →</a>

<!-- 시작 오버레이 (카메라 권한 유도) -->
<div class="start-overlay" id="startOverlay">
  <div class="start-card">
    <div style="font-size: 50px; margin-bottom: 12px;">🌸✋</div>
    <h2 class="serif" style="font-size: 26px; font-weight: 500; margin-bottom: 12px;">내 손으로 꽃 피우기</h2>
    <p style="font-size: 14px; color: #5F5F5F; line-height: 1.7; margin-bottom: 24px;">웹캠 앞에서 <strong>주먹을 쥐면 꽃이 닫히고</strong>,<br><strong>손바닥을 펴면 꽃이 활짝</strong> 피어나요!<br><br>시작하면 카메라 권한을 <strong>허용</strong>해주세요 📷</p>
    <button class="btn" onclick="startApp()">시작하기 →</button>
    <div style="margin-top: 14px;"><a href="#" onclick="startApp(true); return false;" style="font-size: 12px; color: #888;">카메라 없이 슬라이더로 할래요</a></div>
  </div>
</div>

<div class="wrap">
  <div class="title-row">
    <div class="stage-label">Stage 05 · BLOOM</div>
    <div class="title">내 손으로 꽃 피우기</div>
  </div>

  <div class="main-area">
    <!-- 꽃 무대 -->
    <div class="flower-stage">
      <div id="flowerHost">
        <!-- 임시 SVG 꽃 (나중에 영상으로 교체) -->
        <svg id="svgFlower" viewBox="0 0 200 200" style="width: 280px; height: 280px;">
          <g id="petals" transform="translate(100,100)">
            <ellipse class="petal" cx="0" cy="-45" rx="22" ry="48" fill="#E891B5"/>
            <ellipse class="petal" cx="43" cy="-14" rx="22" ry="48" fill="#E891B5" transform="rotate(72)"/>
            <ellipse class="petal" cx="26" cy="36" rx="22" ry="48" fill="#E891B5" transform="rotate(144)"/>
            <ellipse class="petal" cx="-26" cy="36" rx="22" ry="48" fill="#E891B5" transform="rotate(216)"/>
            <ellipse class="petal" cx="-43" cy="-14" rx="22" ry="48" fill="#E891B5" transform="rotate(288)"/>
          </g>
          <circle cx="100" cy="100" r="22" fill="#F5BC4D"/>
        </svg>
      </div>
      <!-- 영상 교체 시 사용: <video id="bloomVideo" muted playsinline></video> -->
    </div>

    <!-- 오른쪽 패널 -->
    <div class="side-panel">
      <div class="cam-box">
        <video id="cam" autoplay playsinline muted></video>
        <div class="gesture-badge" id="gestureBadge">🖐️</div>
        <div class="cam-status" id="camStatus">카메라 준비 중...</div>
      </div>
      <div class="bloom-meter">
        <div class="meter-label"><span>개화도</span><b><span id="bloomPct">0</span>%</b></div>
        <div class="meter-track"><div class="meter-fill" id="meterFill"></div></div>
      </div>
      <div class="fallback">
        <div class="fallback-label">✋ 손이 잘 안 잡히면 직접 조절하세요</div>
        <input type="range" class="slider" id="manualSlider" min="0" max="100" value="0">
      </div>
    </div>
  </div>

  <div class="hint-bar">✊ <b>주먹</b> → 꽃봉오리 닫힘 &nbsp;·&nbsp; ✋ <b>손바닥</b> → 꽃 활짝 피움</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script>
(function() {
  var bloom = 0;        // 0~100 개화도
  var targetBloom = 0;  // 목표값 (부드럽게 따라감)
  var usingCamera = false;

  // 꽃 렌더링 (SVG 버전 — 나중에 영상으로 교체)
  function renderFlower(v) {
    document.getElementById('bloomPct').textContent = Math.round(v);
    document.getElementById('meterFill').style.width = v + '%';
    // SVG 꽃잎 펼치기: 오므림(0) → 활짝(100)
    var petals = document.getElementById('petals');
    if (petals) {
      var scale = 0.35 + (v / 100) * 0.65;      // 0.35~1.0
      var spread = (v / 100);                    // 꽃잎 벌어짐
      petals.style.transform = 'scale(' + scale + ')';
      var els = petals.querySelectorAll('.petal');
      els.forEach(function(p, i) {
        var baseRot = i * 72;
        p.setAttribute('transform', 'rotate(' + baseRot + ') translate(0,' + (-spread * 10) + ')');
      });
    }
    // ── 영상 버전으로 교체할 때: 아래 주석 해제 ──
    // var vid = document.getElementById('bloomVideo');
    // if (vid && vid.duration) { vid.currentTime = (v/100) * vid.duration; }
  }

  // 부드러운 애니메이션 루프
  function animate() {
    bloom += (targetBloom - bloom) * 0.15;
    renderFlower(bloom);
    requestAnimationFrame(animate);
  }
  animate();

  // 슬라이더 (폴백)
  document.getElementById('manualSlider').addEventListener('input', function() {
    if (!usingCamera) targetBloom = parseInt(this.value);
  });

  // ===== 손동작 인식 =====
  window.startApp = function(skipCamera) {
    document.getElementById('startOverlay').style.display = 'none';
    if (skipCamera) {
      document.getElementById('camStatus').textContent = '슬라이더 모드';
      return;
    }
    initHands();
  };

  function initHands() {
    if (typeof Hands === 'undefined') {
      document.getElementById('camStatus').textContent = '손인식 로드 실패 — 슬라이더 사용';
      return;
    }
    var hands = new Hands({ locateFile: function(f) {
      return 'https://cdn.jsdelivr.net/npm/@mediapipe/hands/' + f;
    }});
    hands.setOptions({ maxNumHands: 1, modelComplexity: 0, minDetectionConfidence: 0.6, minTrackingConfidence: 0.5 });
    hands.onResults(onHands);

    var video = document.getElementById('cam');
    var camera = new Camera(video, {
      onFrame: async function() { await hands.send({ image: video }); },
      width: 480, height: 360
    });
    camera.start().then(function() {
      usingCamera = true;
      document.getElementById('camStatus').textContent = '✅ 손을 보여주세요';
    }).catch(function() {
      document.getElementById('camStatus').textContent = '카메라 거부됨 — 슬라이더 사용';
    });
  }

  function onHands(results) {
    if (!results.multiHandLandmarks || results.multiHandLandmarks.length === 0) {
      document.getElementById('gestureBadge').textContent = '👀';
      return;
    }
    var lm = results.multiHandLandmarks[0];
    var openness = calcOpenness(lm); // 0~1
    targetBloom = openness * 100;
    document.getElementById('gestureBadge').textContent = openness > 0.5 ? '✋' : '✊';
  }

  // 손 벌린 정도: 손가락 끝~손목 거리로 계산
  function calcOpenness(lm) {
    var wrist = lm[0];
    var tips = [8, 12, 16, 20]; // 검지·중지·약지·새끼 끝
    var mcps = [5, 9, 13, 17];  // 각 손가락 밑마디
    var extended = 0;
    for (var i = 0; i < tips.length; i++) {
      var dTip = dist(lm[tips[i]], wrist);
      var dMcp = dist(lm[mcps[i]], wrist);
      if (dTip > dMcp * 1.15) extended++; // 끝이 밑마디보다 멀면 펴진 것
    }
    return extended / 4; // 0(주먹)~1(손바닥)
  }
  function dist(a, b) { return Math.hypot(a.x - b.x, a.y - b.y); }
})();
</script>

</body>
</html>
