<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stage 05 · 꽃 피우기 — BLOOM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&family=Nanum+Myeongjo:wght@400;700&display=swap">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.min.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; overflow: hidden; }
body { font-family: 'Pretendard', -apple-system, sans-serif; color: #FFF; background: #000; font-size: 15px; }
.serif { font-family: 'Playfair Display', 'Nanum Myeongjo', serif; }
.italic-cap { font-family: 'Cormorant Garamond', serif; font-style: italic; }

.home-btn { position: fixed; top: 20px; left: 20px; z-index: 200; padding: 8px 16px; background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.25); border-radius: 20px; font-size: 13px; color: #FFF; text-decoration: none; font-family: 'Cormorant Garamond', serif; font-style: italic; transition: all 0.3s; backdrop-filter: blur(10px); }
.home-btn:hover { background: rgba(255,255,255,0.25); }
.next-btn-top { position: fixed; top: 20px; right: 20px; z-index: 200; padding: 8px 18px; background: #E91A75; border-radius: 20px; font-size: 13px; color: #FFF; text-decoration: none; transition: all 0.3s; }
.next-btn-top:hover { background: #C71060; }

.stage { width: 100vw; height: 100vh; position: relative; background: #000; display: flex; align-items: center; justify-content: center; overflow: hidden; }

#bloomVideo { max-width: 100%; max-height: 100%; object-fit: contain; }
#svgFlower { width: 420px; height: 420px; }

.top-title { position: absolute; top: 22px; left: 50%; transform: translateX(-50%); z-index: 150; text-align: center; }
.top-title .lbl { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 14px; color: rgba(255,255,255,0.6); }
.top-title .ttl { font-family: 'Playfair Display', 'Nanum Myeongjo', serif; font-size: 22px; font-weight: 500; color: rgba(255,255,255,0.9); }

.cam-box { position: absolute; bottom: 70px; right: 24px; width: 200px; height: 150px; border-radius: 14px; background: #1A1A1A; overflow: hidden; border: 2px solid rgba(255,255,255,0.25); z-index: 150; box-shadow: 0 8px 30px rgba(0,0,0,0.5); }
#cam { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
.gesture-badge { position: absolute; top: 8px; right: 8px; font-size: 22px; background: rgba(255,255,255,0.9); width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
.cam-status { position: absolute; bottom: 6px; left: 6px; font-size: 10px; color: #FFF; background: rgba(0,0,0,0.6); padding: 3px 8px; border-radius: 8px; }
.cam-box.hidden { display: none; }

.bottom-bar { position: absolute; bottom: 0; left: 0; right: 0; padding: 16px 30px 18px; background: linear-gradient(transparent, rgba(0,0,0,0.7)); z-index: 150; display: flex; align-items: center; gap: 16px; }
.play-track { flex: 1; height: 6px; background: rgba(255,255,255,0.2); border-radius: 3px; position: relative; cursor: pointer; }
.play-fill { height: 100%; background: #FF7A1A; border-radius: 3px; width: 0%; transition: width 0.12s ease; }
.play-knob { position: absolute; top: 50%; transform: translate(-50%,-50%); width: 14px; height: 14px; background: #FF7A1A; border-radius: 50%; left: 0%; transition: left 0.12s ease; box-shadow: 0 0 8px rgba(255,122,26,0.8); }
.time-label { font-size: 12px; color: rgba(255,255,255,0.7); }

.controls { position: absolute; bottom: 70px; left: 24px; z-index: 150; display: flex; flex-direction: column; gap: 10px; }
.ctrl-btn { display: inline-flex; align-items: center; gap: 8px; padding: 11px 18px; border-radius: 100px; font-size: 13px; cursor: pointer; transition: all 0.3s; border: 1px solid rgba(255,255,255,0.25); background: rgba(255,255,255,0.1); color: #FFF; backdrop-filter: blur(10px); white-space: nowrap; }
.ctrl-btn:hover { background: rgba(255,255,255,0.22); }
.ctrl-btn.primary { background: rgba(233,26,117,0.8); border-color: #E91A75; }
.ctrl-btn.primary:hover { background: #E91A75; }
.ctrl-btn.done { background: rgba(99,153,34,0.7); border-color: #639922; }

.start-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.92); display: flex; align-items: center; justify-content: center; z-index: 500; }
.start-card { text-align: center; max-width: 460px; padding: 40px; }
.btn { padding: 14px 32px; border-radius: 100px; font-size: 15px; cursor: pointer; border: none; background: #E91A75; color: #FFF; font-family: 'Pretendard'; transition: all 0.3s; }
.btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(233,26,117,0.5); }

.flash-msg { position: absolute; top: 24%; left: 50%; transform: translateX(-50%); z-index: 300; background: rgba(0,0,0,0.85); padding: 14px 24px; border-radius: 12px; font-size: 13px; opacity: 0; transition: opacity 0.4s; pointer-events: none; max-width: 80%; text-align: center; line-height: 1.6; }
.flash-msg.show { opacity: 1; }
</style>
</head>
<body>

<a href="stage4-2.html" class="home-btn">‹ 이전으로</a>
<a href="part2.html" class="next-btn-top">2부 · 투자의 세계 →</a>

<div class="start-overlay" id="startOverlay">
  <div class="start-card">
    <div style="font-size: 50px; margin-bottom: 14px;">🌸✋</div>
    <h2 class="serif" style="font-size: 28px; font-weight: 500; margin-bottom: 14px;">손 끝에서 피어나는 내 마음</h2>
    <p style="font-size: 14px; color: rgba(255,255,255,0.7); line-height: 1.8; margin-bottom: 26px;">
      내 꽃 영상을 올리고, <strong style="color:#FFF;">웹캠 앞에서 손을 펴고 쥐어</strong> 꽃을 피워보세요.<br>
      ✊ 주먹 → 봉오리 &nbsp;·&nbsp; ✋ 손바닥 → 활짝!
    </p>
    <button class="btn" onclick="enterStage()">시작하기 →</button>
  </div>
</div>

<div class="stage" id="stage">
  <div class="top-title">
    <div class="lbl">Stage 05 · BLOOM</div>
    <div class="ttl">손 끝에서 피어나는 내 마음</div>
  </div>

  <video id="bloomVideo" muted playsinline preload="auto" style="display:none;"></video>

  <!-- 기본 꽃 (영상 없을 때 표시 / 슬라이더·손동작으로 개폐) -->
  <svg id="svgFlower" viewBox="0 0 200 200">
    <defs>
      <radialGradient id="petalGrad" cx="50%" cy="35%" r="70%">
        <stop offset="0%" stop-color="#E3C8F2"/>
        <stop offset="100%" stop-color="#B98BDD"/>
      </radialGradient>
    </defs>
    <g transform="translate(100,100)">
      <!-- 뒤쪽 잎 -->
      <g id="leaves">
        <ellipse cx="0" cy="46" rx="10" ry="26" fill="#6FA85C" transform="rotate(28)"/>
        <ellipse cx="0" cy="46" rx="10" ry="26" fill="#7FB86A" transform="rotate(-28)"/>
      </g>
      <!-- 꽃잎 6장: 미리 부채꼴로 배치 -->
      <g id="petals">
        <ellipse class="petal" cx="0" cy="-42" rx="17" ry="42" fill="url(#petalGrad)" stroke="#A877CF" stroke-width="1" transform="rotate(0)"/>
        <ellipse class="petal" cx="0" cy="-42" rx="17" ry="42" fill="url(#petalGrad)" stroke="#A877CF" stroke-width="1" transform="rotate(60)"/>
        <ellipse class="petal" cx="0" cy="-42" rx="17" ry="42" fill="url(#petalGrad)" stroke="#A877CF" stroke-width="1" transform="rotate(120)"/>
        <ellipse class="petal" cx="0" cy="-42" rx="17" ry="42" fill="url(#petalGrad)" stroke="#A877CF" stroke-width="1" transform="rotate(180)"/>
        <ellipse class="petal" cx="0" cy="-42" rx="17" ry="42" fill="url(#petalGrad)" stroke="#A877CF" stroke-width="1" transform="rotate(240)"/>
        <ellipse class="petal" cx="0" cy="-42" rx="17" ry="42" fill="url(#petalGrad)" stroke="#A877CF" stroke-width="1" transform="rotate(300)"/>
      </g>
      <!-- 가운데 꽃술 -->
      <circle id="flowerCenter" cx="0" cy="0" r="16" fill="#F5D77A" stroke="#E6BE52" stroke-width="2"/>
    </g>
  </svg>

  <div class="controls">
    <label class="ctrl-btn primary" id="uploadBtn" for="videoInput"><span>📁</span><span>내 영상 업로드</span></label>
    <input type="file" id="videoInput" accept="video/*" style="display:none;">
    <div class="ctrl-btn" id="defaultBtn" onclick="loadDefault()"><span>🌸</span><span>기본 꽃 영상으로</span></div>
    <div class="ctrl-btn" id="camBtn" onclick="enableCamera()"><span>📷</span><span>웹캠 손동작 켜기</span></div>
  </div>

  <div class="cam-box hidden" id="camBox">
    <video id="cam" autoplay playsinline muted></video>
    <div class="gesture-badge" id="gestureBadge">🖐️</div>
    <div class="cam-status" id="camStatus">준비 중...</div>
  </div>

  <div class="bottom-bar">
    <span class="time-label">🌱</span>
    <div class="play-track" id="playTrack">
      <div class="play-fill" id="playFill"></div>
      <div class="play-knob" id="playKnob"></div>
    </div>
    <span class="time-label">🌸 <span id="bloomPct">0</span>%</span>
  </div>

  <div class="flash-msg" id="flashMsg"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script>
(function() {
  // 수료증에서 왔으면 '2부' 버튼 + '이전으로' 버튼 숨기기 (학습 웹앱 재진입 차단)
  if (new URLSearchParams(location.search).get('from') === 'souvenir') {
    var nb = document.querySelector('.next-btn-top');
    if (nb) nb.style.display = 'none';
    var hb = document.querySelector('.home-btn');
    if (hb) hb.style.display = 'none';
  }

  var bloom = 0, targetBloom = 0;
  var usingCamera = false;
  var hasVideo = false;
  var videoReady = false;

  var videoMap = { joy:'assets/bloom-joy.mp4', anger:'assets/bloom-anger.mp4', depress:'assets/bloom-depress.mp4', anxiety:'assets/bloom-anxiety.mp4' };

  function flash(msg, ms) {
    var f = document.getElementById('flashMsg');
    f.innerHTML = msg; f.classList.add('show');
    setTimeout(function(){ f.classList.remove('show'); }, ms || 2500);
  }

  window.enterStage = function() {
    document.getElementById('startOverlay').style.display = 'none';
  };

  document.getElementById('videoInput').addEventListener('change', function(e) {
    var file = e.target.files[0];
    if (!file) return;
    setVideo(URL.createObjectURL(file), '내 영상');
    document.getElementById('uploadBtn').classList.add('done');
    document.getElementById('uploadBtn').innerHTML = '<span>✓</span><span>내 영상 업로드 완료</span>';
  });

  window.loadDefault = function() {
    var key = 'anxiety';
    try { var s = localStorage.getItem('bloomEmotion'); if (s) key = JSON.parse(s).key; } catch(err) {}
    var src = videoMap[key] || videoMap.anxiety;
    flash('🌸 ' + src + ' 불러오는 중...');
    setVideo(src, '기본 꽃 영상');
  };

  function setVideo(src, label) {
    var v = document.getElementById('bloomVideo');
    videoReady = false;
    hasVideo = false;
    v.onloadeddata = function() {
      hasVideo = true; videoReady = true;
      v.style.display = 'block';
      document.getElementById('svgFlower').style.display = 'none';
      flash('🌸 ' + label + ' 준비 완료! 슬라이더나 손으로 피워보세요');
      render(bloom);
    };
    v.oncanplay = function() {
      if (!videoReady) {
        hasVideo = true; videoReady = true;
        v.style.display = 'block';
        document.getElementById('svgFlower').style.display = 'none';
      }
    };
    v.onerror = function() {
      hasVideo = false;
      document.getElementById('svgFlower').style.display = 'block';
      flash('⚠️ 영상을 못 불러왔어요.<br>주소: ' + src + '<br>파일명을 확인하거나, 슬라이더로 진행하세요.', 5000);
    };
    v.src = src;
    v.load();
  }

  // 영상이 '활짝 핀 모습'이 영상 시작(0초)에 있으면 true, 끝에 있으면 false 로 바꾸세요.
  var BLOOM_AT_START = true;

  function driveVideo(vid, ratio, dt) {
    if (!vid.duration || isNaN(vid.duration)) return;
    var dur = vid.duration - 0.05;
    var target = BLOOM_AT_START ? (1 - ratio) * dur : ratio * dur;
    var cur = vid.currentTime;
    var diff = target - cur;
    if (Math.abs(diff) < 0.04) {            // 목표 도달 → 멈춤
      if (!vid.paused) vid.pause();
      return;
    }
    if (diff > 0) {                          // 앞으로 → 실제 재생(부드러움)
      if (vid.paused) { var p = vid.play(); if (p && p.catch) p.catch(function(){}); }
      if (diff > 0.5) vid.currentTime = Math.min(target, cur + dt * 2.2); // 너무 뒤처지면 살짝 따라잡기
    } else {                                 // 뒤로 → 역재생 불가, 조금씩 되감기
      if (!vid.paused) vid.pause();
      vid.currentTime = Math.max(target, cur - dt * 1.8);
    }
  }

  function render(v, dt) {
    dt = dt || 0.016;
    var ratio = v / 100;
    document.getElementById('bloomPct').textContent = Math.round(v);
    document.getElementById('playFill').style.width = v + '%';
    document.getElementById('playKnob').style.left = v + '%';
    if (hasVideo && videoReady) {
      driveVideo(document.getElementById('bloomVideo'), ratio, dt);
    } else {
      // SVG 기본 꽃: 오므림(0.45) → 활짝(1.0) + 살짝 비틀어 피어나는 느낌
      var petals = document.getElementById('petals');
      if (petals) {
        var s = (0.45 + ratio * 0.55).toFixed(3);
        var rot = (-16 * (1 - ratio)).toFixed(2);
        petals.setAttribute('transform', 'rotate(' + rot + ') scale(' + s + ')');
      }
      var center = document.getElementById('flowerCenter');
      if (center) center.setAttribute('r', (12 + ratio * 6).toFixed(2));
    }
  }
  var _lastT = (window.performance && performance.now) ? performance.now() : Date.now();
  function animate(now) {
    now = now || ((window.performance && performance.now) ? performance.now() : Date.now());
    var dt = Math.min(0.05, (now - _lastT) / 1000); _lastT = now;
    bloom += (targetBloom - bloom) * 0.18;
    render(bloom, dt);
    requestAnimationFrame(animate);
  }
  requestAnimationFrame(animate);

  var track = document.getElementById('playTrack'), dragging = false;
  function seek(e) {
    var rect = track.getBoundingClientRect();
    var x = (e.clientX - rect.left) / rect.width;
    x = Math.max(0, Math.min(1, x));
    if (!usingCamera) targetBloom = x * 100;
  }
  track.addEventListener('mousedown', function(e){ dragging = true; seek(e); });
  document.addEventListener('mousemove', function(e){ if (dragging) seek(e); });
  document.addEventListener('mouseup', function(){ dragging = false; });
  track.addEventListener('click', seek);

  window.enableCamera = function() {
    document.getElementById('camBox').classList.remove('hidden');
    document.getElementById('camBtn').style.display = 'none';
    if (typeof Hands === 'undefined') { document.getElementById('camStatus').textContent = '손인식 로드 실패'; flash('손인식을 못 불러왔어요. 재생바를 사용하세요.'); return; }
    try {
      var hands = new Hands({ locateFile: function(f){ return 'https://cdn.jsdelivr.net/npm/@mediapipe/hands/' + f; }});
      hands.setOptions({ maxNumHands:1, modelComplexity:0, minDetectionConfidence:0.6, minTrackingConfidence:0.5 });
      hands.onResults(onHands);
      var video = document.getElementById('cam');
      var camera = new Camera(video, { onFrame: async function(){ await hands.send({ image: video }); }, width:480, height:360 });
      camera.start().then(function(){ usingCamera = true; document.getElementById('camStatus').textContent = '✅ 손 보여주세요'; })
        .catch(function(){ document.getElementById('camStatus').textContent = '카메라 거부됨'; flash('카메라를 못 켰어요. 재생바를 사용하세요.'); });
    } catch(err) { document.getElementById('camStatus').textContent = '오류'; }
  };
  function onHands(results) {
    if (!results.multiHandLandmarks || !results.multiHandLandmarks.length) { document.getElementById('gestureBadge').textContent = '👀'; return; }
    var lm = results.multiHandLandmarks[0];
    var o = openness(lm);
    targetBloom = o * 100;
    document.getElementById('gestureBadge').textContent = o > 0.5 ? '✋' : '✊';
  }
  function openness(lm) {
    // 손가락 4개의 '펴진 정도'를 연속값으로 측정 (주먹 ~1.0, 활짝 ~1.7)
    var wrist = lm[0], tips=[8,12,16,20], mcps=[5,9,13,17], sum=0;
    for (var i=0;i<4;i++){
      sum += dist(lm[tips[i]], wrist) / (dist(lm[mcps[i]], wrist) + 0.0001);
    }
    var avg = sum / 4;
    var o = (avg - 1.05) / (1.75 - 1.05);   // 1.05~1.75 구간을 0~1로 정규화
    return Math.max(0, Math.min(1, o));
  }
  function dist(a,b){ return Math.hypot(a.x-b.x, a.y-b.y); }
})();
</script>

</body>
</html>
